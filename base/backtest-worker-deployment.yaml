apiVersion: apps/v1
kind: Deployment
metadata:
  name: backtest-worker
  labels:
    app: backtest-worker
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backtest-worker
  template:
    metadata:
      labels:
        app: backtest-worker
    spec:
      priorityClassName: backtest-batch
      tolerations:
        - key: "hft-workload"
          operator: "Equal"
          value: "backtest"
          effect: "NoSchedule"
      containers:
        - name: worker
          image: ghcr.io/example/backtest-worker:latest
          env:
            - name: TASK_TOPIC
              value: backtest.tasks.v1
            - name: RESULT_TOPIC
              value: backtest.results.v1
          resources:
            requests:
              cpu: "500m"
              memory: "1Gi"
            limits:
              cpu: "2"
              memory: "4Gi"
